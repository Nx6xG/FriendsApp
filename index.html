<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0a0c12" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&display=swap" rel="stylesheet" />
    <title>Friends</title>
  </head>
  <body>
    <div id="root"></div>
    <div id="splash" style="position:fixed;inset:0;z-index:9999;background:#0a0c12;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.4s ease-out">
      <img src="/icon-192.png" style="width:80px;height:80px;margin-bottom:16px;border-radius:20px;animation:splashPulse 1.5s ease-in-out infinite" alt="Friends" />
      <div style="font-size:22px;font-weight:800;color:#e4e4e7;letter-spacing:-0.02em;font-family:'DM Sans',system-ui,sans-serif">Friends</div>
      <div style="margin-top:40px;width:32px;height:32px;border:3px solid #27293a;border-top-color:#6366f1;border-radius:50%;animation:splashSpin 0.8s linear infinite"></div>
    </div>
    <style>
      @keyframes splashSpin { to { transform: rotate(360deg) } }
      @keyframes splashPulse { 0%,100% { transform: scale(1) } 50% { transform: scale(1.1) } }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
